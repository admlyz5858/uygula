<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#0a0a1a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="Marble Race Simulator" />
    <title>Marble Race</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="uiOverlay" class="ui-overlay">
        <div class="top-bar">
            <div class="logo">MARBLE RACE</div>
            <div class="top-controls">
                <button id="fpsToggle" class="icon-btn" title="FPS">📊</button>
                <button id="leaderboardToggle" class="icon-btn" title="Leaderboard">🏆</button>
                <button id="muteBtn" class="icon-btn" title="Sound">🔊</button>
            </div>
        </div>

        <div class="control-panel" id="controlPanel">
            <div class="panel-header" id="panelToggle">
                <span>Controls</span>
                <span class="toggle-arrow">▼</span>
            </div>
            <div class="panel-body" id="panelBody">
                <div class="control-row">
                    <label>Marbles</label>
                    <input type="number" id="marbleCount" min="2" max="30" value="10" />
                </div>
                <div class="control-row">
                    <label>Seed</label>
                    <div class="seed-row">
                        <input type="number" id="seedInput" />
                        <button id="newSeedBtn" class="small-btn" title="Random Seed">🎲</button>
                    </div>
                </div>
                <div class="control-row">
                    <label>Camera</label>
                    <select id="cameraMode">
                        <option value="static" selected>Full Track</option>
                        <option value="follow_leader">Follow Leader</option>
                        <option value="cinematic">Cinematic</option>
                    </select>
                </div>
                <div class="control-row">
                    <label>Speed</label>
                    <select id="speedSelect">
                        <option value="0.5">0.5x</option>
                        <option value="1" selected>1x</option>
                        <option value="1.5">1.5x</option>
                        <option value="2">2x</option>
                        <option value="3">3x</option>
                    </select>
                </div>
                <div class="button-row">
                    <button id="startBtn" class="action-btn primary">▶ START RACE</button>
                    <button id="restartBtn" class="action-btn secondary">↻ NEW TRACK</button>
                    <button id="replayBtn" class="action-btn secondary">⏪ REPLAY</button>
                </div>
            </div>
        </div>

        <div id="rankingsList" class="rankings-list"></div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
