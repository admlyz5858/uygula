<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Parkur Yarışları - 3D Parkour Racing</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Exo+2:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container"></div>

    <!-- MAIN MENU -->
    <div id="menu-screen" class="screen active">
        <div class="menu-content">
            <div class="title-block">
                <h1 class="game-title">PARKUR<br>YARIŞLARI</h1>
                <p class="game-subtitle">3D Parkour Racing</p>
            </div>
            <div class="menu-buttons">
                <button id="btn-quick-race" class="btn btn-primary">
                    <span class="btn-icon">&#9654;</span> Hızlı Yarış
                </button>
                <button id="btn-tournament" class="btn btn-secondary">
                    <span class="btn-icon">&#9733;</span> Turnuva Modu
                </button>
                <button id="btn-auto-race" class="btn btn-accent">
                    <span class="btn-icon">&#9658;</span> Otomatik Yarış (YouTube)
                </button>
                <button id="btn-settings" class="btn btn-outline">Ayarlar</button>
            </div>
            <div class="menu-footer">
                <span>v1.0 - Parkur Yarışları</span>
            </div>
        </div>
    </div>

    <!-- RACE SETUP -->
    <div id="setup-screen" class="screen">
        <div class="setup-content">
            <h2 class="setup-title">Yarış Ayarları</h2>

            <div class="setup-section">
                <h3>Parkur Seçimi</h3>
                <div id="course-list" class="course-grid"></div>
            </div>

            <div class="setup-section">
                <h3>Yarışmacı Sayısı: <span id="racer-count-display">8</span></h3>
                <input type="range" id="racer-count-slider" min="2" max="12" value="8" class="slider">
            </div>

            <div class="setup-section">
                <h3>Seçili Yarışmacılar</h3>
                <div id="racer-preview" class="racer-preview-grid"></div>
                <button id="btn-shuffle-racers" class="btn btn-small">Karıştır</button>
            </div>

            <div class="setup-buttons">
                <button id="btn-back-menu" class="btn btn-outline">Geri</button>
                <button id="btn-start-race" class="btn btn-primary btn-large">Yarışı Başlat!</button>
            </div>
        </div>
    </div>

    <!-- SETTINGS SCREEN -->
    <div id="settings-screen" class="screen">
        <div class="settings-content">
            <h2 class="setup-title">Ayarlar</h2>
            <div class="setting-row">
                <label>Kamera Modu</label>
                <select id="camera-mode">
                    <option value="chase">Takip Kamerası</option>
                    <option value="side">Yan Kamera</option>
                    <option value="cinematic">Sinematik</option>
                    <option value="top">Üst Görünüm</option>
                </select>
            </div>
            <div class="setting-row">
                <label>Grafik Kalitesi</label>
                <select id="quality-setting">
                    <option value="high">Yüksek</option>
                    <option value="medium" selected>Orta</option>
                    <option value="low">Düşük</option>
                </select>
            </div>
            <div class="setting-row">
                <label>Ses Efektleri</label>
                <input type="checkbox" id="sound-toggle" checked>
            </div>
            <div class="setting-row">
                <label>Yarış Hızı</label>
                <select id="race-speed">
                    <option value="0.5">Yavaş (0.5x)</option>
                    <option value="1" selected>Normal (1x)</option>
                    <option value="1.5">Hızlı (1.5x)</option>
                    <option value="2">Çok Hızlı (2x)</option>
                </select>
            </div>
            <button id="btn-back-settings" class="btn btn-outline">Geri</button>
        </div>
    </div>

    <!-- RACE HUD -->
    <div id="race-hud" class="screen">
        <div id="hud-top">
            <div id="course-name-hud" class="hud-course-name"></div>
            <div id="race-timer" class="hud-timer">00:00.00</div>
        </div>
        <div id="hud-positions" class="hud-positions"></div>
        <div id="countdown-overlay" class="countdown hidden">
            <span id="countdown-text">3</span>
        </div>
        <div id="hud-bottom">
            <div id="progress-bar-container" class="progress-bar-container">
                <div id="progress-bar-track" class="progress-bar-track"></div>
            </div>
        </div>
        <button id="btn-skip-race" class="btn btn-small btn-skip">Atla</button>
    </div>

    <!-- RESULTS SCREEN -->
    <div id="results-screen" class="screen">
        <div class="results-content">
            <h2 class="results-title">Yarış Sonuçları</h2>
            <div id="results-podium" class="results-podium"></div>
            <div id="results-table" class="results-table"></div>
            <div class="results-buttons">
                <button id="btn-replay" class="btn btn-secondary">Tekrar Oynat</button>
                <button id="btn-new-race" class="btn btn-primary">Yeni Yarış</button>
                <button id="btn-back-menu2" class="btn btn-outline">Ana Menü</button>
            </div>
        </div>
    </div>

    <!-- TOURNAMENT SCREEN -->
    <div id="tournament-screen" class="screen">
        <div class="tournament-content">
            <h2 class="setup-title">Turnuva Sıralaması</h2>
            <div id="tournament-standings" class="tournament-standings"></div>
            <div id="tournament-race-info" class="tournament-race-info"></div>
            <div class="results-buttons">
                <button id="btn-next-tournament-race" class="btn btn-primary">Sonraki Yarış</button>
                <button id="btn-end-tournament" class="btn btn-outline">Turnuvayı Bitir</button>
            </div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
