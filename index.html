<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#4f46e5" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
    <title>Mobil Focus Pomodoro</title>
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <h1>Focus Pomodoro</h1>
        <p>Mobil odak zamanlayıcı</p>
      </header>

      <section class="timer-card">
        <div class="mode-row">
          <span id="modeLabel" class="mode-badge mode-badge--focus">Odak</span>
          <span id="sessionCount" class="session-count">Tamamlanan odak: 0</span>
        </div>

        <h2 id="timerDisplay" class="timer-display">25:00</h2>
        <div class="progress-track" aria-hidden="true">
          <div id="progressBar" class="progress-bar"></div>
        </div>

        <div class="controls">
          <button id="startPauseBtn" class="btn btn--primary">Başlat</button>
          <button id="resetBtn" class="btn btn--secondary">Sıfırla</button>
          <button id="skipBtn" class="btn btn--ghost">Geç</button>
        </div>
      </section>

      <section class="settings-card">
        <h3>Ayarlar</h3>
        <div class="settings-grid">
          <label>
            <span>Odak (dk)</span>
            <input id="focusInput" type="number" min="1" max="90" value="25" />
          </label>
          <label>
            <span>Kısa mola (dk)</span>
            <input id="shortBreakInput" type="number" min="1" max="30" value="5" />
          </label>
          <label>
            <span>Uzun mola (dk)</span>
            <input id="longBreakInput" type="number" min="5" max="60" value="15" />
          </label>
          <label>
            <span>Uzun mola döngüsü</span>
            <input id="cycleInput" type="number" min="2" max="8" value="4" />
          </label>
        </div>
        <button id="saveSettingsBtn" class="btn btn--secondary btn--full">Ayarları kaydet</button>
      </section>

      <section class="tips-card">
        <h3>Hızlı ipucu</h3>
        <ul>
          <li>Her odak seansında tek bir göreve odaklan.</li>
          <li>Bildirimleri kapatıp telefonu sessize al.</li>
          <li>Molada ayağa kalkıp kısa yürüyüş yap.</li>
        </ul>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
