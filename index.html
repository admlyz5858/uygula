<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#0a0a1a">
    <title>Misket Yarışı - Marble Race</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏁</text></svg>">
    <link rel="manifest" href="manifest.webmanifest">
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="menuScreen" class="overlay">
        <div class="menu-panel">
            <h1 class="game-title">Misket Yarışı</h1>
            <p class="game-subtitle">Favori misketini seç ve yarışı izle!</p>
            <div id="marbleGrid" class="marble-grid"></div>
            <button id="startBtn" class="btn-action" disabled>
                <span>Yarışı Başlat</span>
            </button>
            <p class="hint-text">Bir misket seçerek yarışa katıl</p>
        </div>
    </div>

    <div id="hud" class="hud hidden">
        <div id="countdown" class="countdown hidden"></div>
        <div id="leaderboard" class="leaderboard"></div>
        <div id="raceInfo" class="race-info">
            <div class="info-item">
                <span class="info-label">Hız</span>
                <span id="speedVal" class="info-value">0</span>
                <span class="info-unit">km/h</span>
            </div>
            <div class="info-item">
                <span class="info-label">Süre</span>
                <span id="timeVal" class="info-value">0.0</span>
                <span class="info-unit">s</span>
            </div>
        </div>
        <div id="sectionName" class="section-name hidden"></div>
        <div id="yourPos" class="your-position hidden">
            <span id="yourPosText"></span>
        </div>
    </div>

    <div id="resultsScreen" class="overlay hidden">
        <div class="results-panel">
            <h2 class="results-title">Yarış Bitti!</h2>
            <div id="podium" class="podium"></div>
            <div id="resultsList" class="results-list"></div>
            <div id="yourResult" class="your-result"></div>
            <button id="replayBtn" class="btn-action">
                <span>Tekrar Oyna</span>
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon@0.6.2/build/cannon.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
